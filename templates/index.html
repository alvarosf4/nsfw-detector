<!DOCTYPE html>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#38bdf8">
<html>
<head>
    <title>Pussy Detector</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h2 {
            margin-bottom: 20px;
        }

        .container {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 380px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        #drop-area {
            border: 2px dashed #38bdf8;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        #drop-area.hover {
            background: #334155;
        }

        input {
            display: none;
        }

        img {
            margin-top: 10px;
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .error {
            color: #f87171;
            margin-top: 10px;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }

        .badge-safe {
            color: #4ade80;
            font-weight: bold;
        }

        .badge-nsfw {
            color: #f87171;
            font-weight: bold;
        }

    </style>
</head>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("SW registrado"))
    .catch(err => console.log("SW error:", err));
}
</script>

<body>

<div class="container">
    <h2>Pussy Detector</h2>

    <form method="POST" enctype="multipart/form-data">
        
        <label id="drop-area">
            <p id="text">Arrastra o haz clic</p>
            <input type="file" name="file" id="fileElem" accept="image/*" required>
            <img id="preview" src="">
        </label>

        <button type="submit">Analizar</button>

        <p class="error" id="error"></p>
    </form>

    {% if data %}
    <div class="result">
        <p>Resultado: 
            <span class="{{ 'badge-nsfw' if data.estado=='NSFW' else 'badge-safe' }}">
                {{data.estado}}
            </span>
        </p>

        <p>Score NSFW: {{ '%.2f'|format(data.nsfw) }}%</p>

        <ul>
        {% for key, value in data.resultados.items() %}
            <li>{{key}}: {{ '%.2f'|format(value) }}%</li>
        {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

<script>
    const dropArea = document.getElementById("drop-area");
    const fileInput = document.getElementById("fileElem");
    const preview = document.getElementById("preview");
    const errorText = document.getElementById("error");
    const text = document.getElementById("text");

    // 🔥 mantener imagen en localStorage
    window.onload = () => {
        const savedImage = localStorage.getItem("previewImage");
        if (savedImage) {
            preview.src = savedImage;
            text.style.display = "none";
        }
    };

    dropArea.addEventListener("click", () => fileInput.click());

    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.classList.add("hover");
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.classList.remove("hover");
    });

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.classList.remove("hover");

        const file = e.dataTransfer.files[0];
        handleFile(file);
    });

    fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        handleFile(file);
    });

    function handleFile(file) {
        errorText.textContent = "";

        if (!file) return;

        if (!file.type.startsWith("image/")) {
            errorText.textContent = "❌ Solo imágenes";
            return;
        }

        if (file.size > 5 * 1024 * 1024) {
            errorText.textContent = "❌ Máx 5MB";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            text.style.display = "none";

            // 🔥 guardar imagen para que no desaparezca
            localStorage.setItem("previewImage", e.target.result);
        };
        reader.readAsDataURL(file);

        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
    }
</script>

</body>
</html>
